# version line removed (deprecated; Docker Compose v2 uses 'services' only)
services:
  frontend:
    build: .
    command: npm run dev
    ports:
      - '5173:5173'
    volumes:
      - .:/app
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - '5000:5000'
    env_file:
      - .env.backend
    depends_on:
      - db

  db:
    image: supabase/postgres:15.8.1.047
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
